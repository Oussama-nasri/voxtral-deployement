name: voxtral

services:

  voxtral-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    image: voxtral-server:latest
    container_name: voxtral-server

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    # --tokenizer-mode mistral  REQUIRED — Voxtral only loads via mistral_common
    # --config-format mistral   REQUIRED — loads mistral config format
    # --load-format mistral     REQUIRED — loads mistral weight format
    # --enforce-eager           saves 300-500MB VRAM by skipping CUDA graph capture
    # --max-model-len 4096      minimal KV cache to fit on 16GB with weights at ~14.5GB
    command: [
      "mistralai/Voxtral-Mini-4B-Realtime-2602",
      "--dtype", "bfloat16",
      "--tokenizer-mode", "mistral",
      "--config-format", "mistral",
      "--load-format", "mistral",
      "--max-model-len", "4096",
      "--gpu-memory-utilization", "0.98",
      "--enforce-eager",
      "--host", "0.0.0.0",
      "--port", "8000"
    ]

    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      - HF_TOKEN=${HF_TOKEN}
      - HF_HOME=/models/huggingface
      - TRANSFORMERS_CACHE=/models/huggingface
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - VLLM_DISABLE_COMPILE_CACHE=1
      - CUDA_VISIBLE_DEVICES=0

    volumes:
      - voxtral-models:/models

    ports:
      - "8000:8000"

    networks:
      - voxtral-net

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 15s
      start_period: 900s
      retries: 3

    shm_size: "4gb"

    ulimits:
      memlock:
        soft: -1
        hard: -1
      stack:
        soft: 67108864
        hard: 67108864

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"


  voxtral-gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    image: voxtral-gateway:latest
    container_name: voxtral-gateway

    environment:
      - VLLM_HOST=voxtral-server
      - VLLM_PORT=8000
      - MODEL_ID=mistralai/Voxtral-Mini-4B-Realtime-2602

    ports:
      - "7860:7860"

    networks:
      - voxtral-net

    depends_on:
      voxtral-server:
        condition: service_started

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"


volumes:
  voxtral-models:
    driver: local

networks:
  voxtral-net:
    driver: bridge